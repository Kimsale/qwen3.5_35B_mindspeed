HF_MODEL_LOAD_PATH: &HF_MODEL_LOAD_PATH /mnt/shared_data_196/sejin/models/Qwen3.5-35B-A3B
WHISPER_MODEL_PATH: &WHISPER_MODEL_PATH /mnt/shared_data_196/sejin/models/whisper-large-v3
DATASET_PATH: &DATASET_PATH /data/sejin/baseline_26/data_audio_distfix_3200/train.jsonl
SAVE_PATH: &SAVE_PATH /data/sejin/baseline_26/output/ep8_mbs1_ga4_pack_legacy_zero2
MM_TOOL_PATH: ./mindspeed_mm/tools/tools.json

gpt_args:
  use_mcore_models: true
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  context_parallel_size: 1
  expert_model_parallel_size: 8
  num_experts: 256
  use_custom_fsdp: true
  use_distributed_optimizer: true
  data_parallel_sharding_strategy: optim_grads
  no_gradient_accumulation_fusion: true

  micro_batch_size: 1
  global_batch_size: 32
  bf16: true
  clip_grad: 1.0
  optimizer_selection: fused_torch_adamw
  lr: 1.0e-4
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.999
  lr_decay_style: cosine
  lr_warmup_fraction: 0.03
  train_iters: 80
  no_load_optim: true
  no_load_rng: true
  no_save_optim: true
  no_save_rng: true
  seed: 42

  log_interval: 1
  save_interval: 10000
  eval_interval: 10000
  eval_iters: 5000
  save: *SAVE_PATH
  log_tps: true

  load: null
  use_cpu_initialization: true
  init_model_with_meta_device: true
  normalization: RMSNorm
  use_fused_rmsnorm: true
  swiglu: true
  use_fused_swiglu: true
  use_flash_attn: true
  vocab_size: 152064
  seq_length: 4096
  make_vocab_size_divisible_by: 1
  tokenizer_type: NullTokenizer
  untie_embeddings_and_output_weights: true
  no_masked_softmax_fusion: true
  num_workers: 8

lora_args:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: q_proj,k_proj,v_proj,o_proj
  lora_register_forward_hook: embed_tokens

data:
  dataset_param:
    dataset_type: huggingface
    attr:
      images: null
      videos: null
      audios: audios
      messages: messages
      role_tag: role
      content_tag: content
      user_tag: user
      assistant_tag: assistant
    preprocess_parameters:
      model_name_or_path: *HF_MODEL_LOAD_PATH
      use_fast_tokenizer: true
      split_special_tokens: false
      audio_sampling_rate: 16000
      audio_feature_extractor_path: *WHISPER_MODEL_PATH
    basic_parameters:
      cutoff_len: 4096
      template: qwen3_omni_nothink
      train_on_prompt: false
      mask_history: false
      dataset_dir: /data/sejin/baseline_26/data_audio_distfix_3200
      dataset: *DATASET_PATH
      cache_dir: /data/sejin/baseline_26/data_audio_distfix_3200/cache_legacy_zero2_pack/
      overwrite_cache: false
      preprocessing_batch_size: 1000
      preprocessing_num_workers: 8
      max_samples: null
  dataloader_param:
    pin_memory: true
    shuffle: true
    dataloader_mode: sampler
    drop_last: true
    sampler_type: BaseRandomBatchSampler
    num_workers: 8
    collate_param:
      model_name: qwen3vl_packed
      ignore_pad_token_for_loss: true

model:
  model_id: qwen3_5_audio_manual_ep
  init_from_hf_path: *HF_MODEL_LOAD_PATH
  model_name_or_path: *HF_MODEL_LOAD_PATH
  trust_remote_code: true
  ignore_mismatched_sizes: true
  text_decoder:
    model_id: qwen3_5lm
    num_layers: 40
    hidden_size: 2048
    num_attention_heads: 16
    num_query_groups: 2
    num_moe_experts: 256
    add_bias_linear: false
    max_position_embeddings: 262144
  attn_implementation: flash_attention_2
  whisper_path: *WHISPER_MODEL_PATH
  audio_token_id: 248076
  audio_projector_act: gelu
  freeze:
    - model.visual
    - audio_tower
  loss_cfg:
    loss_type: default
    router_aux_loss_coef: 0.0
  enable_chunk_loss: true
  chunkloss_plan:
    apply_module: lm_head
    chunk_size: 1024
  use_triton_gdn: true
  use_grouped_expert_matmul: true
  patch:
    bridge_patch: false
